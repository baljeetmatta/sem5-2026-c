    <head>

    </head>
    <body>
      
<div id="container">

     <input type="number" id="qty"/>
    
     <button id="addBtn">+</button>
    
    
    
    <div>

            <th>Price</th>

     </table>   
     </div>
     </div>

<div id="right-Panel">

    <div class="summary-row">
    Order Total:<span id="total"></span>
    </div>
    <div class="summary-row">
    GST
    </div>
    <div>
         <button id="invoiceBtn">Inv</button>
    </div>
</div>
</div>


<div>
    <table id="invoices">
        <tr>
            <th>Invoice</th>
            <th>Dated</th>
            <th>Total</th>
        </tr>
    </table>
</div>
     <script src="./js/pos.js"></script>

</html>
